services:
  backend:
    build: ./backend
    ports:
      - "3032:3032" # Expose backend on port 3032
    environment:
      - DATABASE_URL=mysql://fitify:Aften51Publikum@46.247.108.55:3306/fitify
      - PORT=${BACKEND_PORT}
